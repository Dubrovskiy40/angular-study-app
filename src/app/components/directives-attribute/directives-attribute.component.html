<p>Атрибутивные директивы меняют поведение элемента, к которому они применяются. Например, директива <b>ngClass</b> позволяет
  установить для элемента класс CSS. При этом сама директива применяется к элементу в виде атрибута</p>
<div [ngClass]="{fontStyle: classStyle}">
  <p [ngClass]="{fontSize: classSize}">
    Angular представляет модульную архитектуру приложения
  </p>
</div>
